<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be Mine</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#ffd9e8,#fff0f6,#ffe6f1);
font-family:'Cormorant Garamond',serif;
overflow:hidden;
position:relative;
}

.fall{
position:absolute;
top:-60px;
font-size:30px;
animation:drop linear infinite;
}

@keyframes drop{
0%{transform:translateY(-50px);}
100%{transform:translateY(120vh);}
}

.card{
width:100%;
max-width:420px;
padding:28px;
text-align:center;
background:rgba(255,192,203,.35);
backdrop-filter:blur(12px);
border-radius:28px;
z-index:2;
}

h1{
font-family:'Great Vibes';
font-size:50px;
color:#ff3d7f;
}

p{
font-size:26px;
margin:20px;
}

button{
padding:14px 24px;
margin:10px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
background:#ff4d88;
color:white;
transition:.3s;
}

#msg{
margin-top:18px;
font-size:20px;
color:#ff2e63;
}

#continue{
display:none;
width:100%;
margin-top:15px;
}
</style>
</head>

<body>

<div class="fall" style="left:10%;animation-duration:7s;">❤️</div>
<div class="fall" style="left:30%;animation-duration:5s;">🌹</div>
<div class="fall" style="left:52%;animation-duration:8s;">✨</div>
<div class="fall" style="left:75%;animation-duration:6s;">❤️</div>

<div class="card">

<h1>One Last Question 🌹</h1>

<p>Will You Be Mine? ❤️</p>

<button id="yesBtn" onclick="yesAnswer()">YES 💖</button>
<button id="noBtn" onclick="noAnswer()">NO 🙈</button>

<div id="msg"></div>

<button id="continue" onclick="window.location.href='page5.html'">
Continue 🎂
</button>

</div>

<script>
let yesSize=18;
let noClicks=0;

function noAnswer(){
noClicks++;
yesSize += 8;

let yes=document.getElementById("yesBtn");
yes.style.fontSize=yesSize+"px";

let no=document.getElementById("noBtn");
no.style.transform="translate("+(-15*noClicks)+"px,0px)";

if(noClicks>=5){
no.style.opacity="0";
}
}

function yesAnswer(){
document.getElementById("msg").innerHTML=
"I knew your answer already ❤️";
document.getElementById("continue").style.display="block";
}
</script>

</body>
</html>
