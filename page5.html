<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ladho ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#ffd9e8,#fff0f6,#ffe6f1);
font-family:'Cormorant Garamond',serif;
overflow:hidden;
position:relative;
}

.fall{
position:absolute;
top:-60px;
font-size:30px;
animation:drop linear infinite;
}

@keyframes drop{
0%{transform:translateY(-50px);}
100%{transform:translateY(120vh);}
}

.card{
width:100%;
max-width:430px;
padding:28px;
text-align:center;
background:rgba(255,192,203,.35);
backdrop-filter:blur(12px);
border-radius:28px;
z-index:2;
}

h1{
font-family:'Great Vibes';
font-size:54px;
color:#ff3d7f;
}

#cake{
font-size:90px;
margin:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
background:#ff4d88;
color:white;
}

#note{
display:none;
margin-top:20px;
font-size:21px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="fall" style="left:5%;animation-duration:6s;">🌹</div>
<div class="fall" style="left:20%;animation-duration:8s;">✨</div>
<div class="fall" style="left:42%;animation-duration:5s;">❤️</div>
<div class="fall" style="left:60%;animation-duration:7s;">🌹</div>
<div class="fall" style="left:85%;animation-duration:6s;">✨</div>

<div class="card">

<h1>Happy Birthday Ladho ❤️</h1>

<div id="cake">🎂</div>

<button onclick="cutCake()">Cut The Cake 🎉</button>

<div id="note">
May happiness always choose you 🌸 <br>
May your smile stay endless ❤️ <br><br>

Some people quietly become special… <br>
and somehow make life brighter ✨ <br><br>

Happy Birthday Ladho 🎂💖
</div>

<audio id="music">
<source src="birthday-song.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function cutCake(){
document.getElementById("cake").innerHTML="🍰";
document.getElementById("note").style.display="block";
document.getElementById("music").play();
}
</script>

</body>
</html>
